
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    

<div class="container">

    <div class="login-box">

        <h1>Sign Up</h1>

        <input type="text" id="name" placeholder="Enter Username" autocomplete="off">

        <input type="email" id="email" placeholder="Enter Email" autocomplete="off">

        <input type="password" id="password" placeholder="Enter Password" autocomplete="new-password">

    

        <button id="signupBtn">Sign Up</button>

        <p>
            Already have an account?
            <a href="login.html">Login</a>
        </p>

        <hr>

    </div>

</div>
<script type="module" src="app.js"></script>

</body>
</html>
